name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'NextStepBackend/**'  # chỉ chạy khi có thay đổi trong backend
  pull_request:
    branches:
      - main
    paths:
      - 'NextStepBackend/**'

env:
  DOCKER_IMAGE: phiduymanh1/nextstep-backend:latest

jobs:
  build-test:
    name: Build, Test & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NextStepBackend  # chỉ định thư mục làm việc

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Spotless Check
        run: mvn spotless:check

      - name: Build, Test & OWASP Dependency Check
        run: mvn -B clean verify

      - name: Upload OWASP Dependency-Check Report
        if: always()  # Chạy ngay cả khi fail
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: NextStepBackend/target/dependency-check-report.html

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: NextStepBackend/target/surefire-reports/

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: NextStepBackend
        run: docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Push Docker image
        run: docker push ${{ env.DOCKER_IMAGE }}