spring:
  cache:
    type: none
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:   # Để trống hoàn toàn

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: validate
    flyway:
      enabled: true
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  devtools:
    restart:
      enabled: false

server:
  error:
    include-message: always
    include-stacktrace: on_param

logging:
  level:
    root: INFO

app:
  jwt:
    secret: test-my-super-secret-key-minimum-256-bits-for-security
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

  notification:
    email:
      enabled: false
    push:
      enabled: false

  rate-limit:
    enabled: false