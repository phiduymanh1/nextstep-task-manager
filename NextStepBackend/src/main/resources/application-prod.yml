spring:

  # Redis Cache cho PROD
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 minutes
      cache-null-values: false

  datasource:
    url: ${DB_URL_PROD}
    username: ${DB_USERNAME_PROD}
    password: ${DB_PASSWORD_PROD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
  data:
    redis:
      host: ${REDIS_HOST_PROD:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD_PROD}
      database: 0
      ssl:
        enabled: true
      timeout: 5000ms
      jedis:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true


server:
  port: 8443
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: classpath:keystore.p12
    key-store-password: ${KEY_STORE_PASS:manh123}
    key-store-type: PKCS12
    key-alias: nextstep

logging:
  level:
    root: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 3600000
    refresh-token-expiration: 259200000  # 3 days

  notification:
    email:
      enabled: true
      from: ${FROM_EMAIL:noreply@nextstep-app.com}
    push:
      enabled: true

  rate-limit:
    enabled: true